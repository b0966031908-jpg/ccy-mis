<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>天氣查詢</title>
</head>
<body>
    <h1>台灣各縣市天氣查詢</h1>

    請輸入縣市名稱：
    <form method="GET" action="/weather">
        <input type="text" name="city" value="{{ city }}">
        <input type="submit" value="查詢">
    </form>

    {% if weather %}
        <p>{{ location }} 最新天氣預報</p>
        <p>天氣：{{ weather }}，降雨機率：{{ rain }}%</p>
    {% endif %}

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <br><a href="/">返回個人首頁</a>
</body>
</html>
